name: Portfolio CI/CD Pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Test Case 1
      - name: Test Case 1 - Check Required Files
        run: |
          test -f index.html
          test -f style.css
          test -f script.js
          echo "✅ Test Case 1 Passed"

      # Test Case 2
      - name: Test Case 2 - Validate JavaScript
        run: |
          node --check script.js
          echo "✅ Test Case 2 Passed"

      # Test Case 3
      - name: Test Case 3 - Verify HTML Content
        run: |
          grep -q "<title>" index.html
          echo "✅ Test Case 3 Passed"

  deploy:
    needs: test

    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:

      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v5
